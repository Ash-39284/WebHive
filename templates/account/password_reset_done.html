{% extends 'base.html' %}
{% load static %}

{% block title %}Check Your Email | Forefront HQ{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">

        <h1 class="auth-title">Check your email</h1>
        <p class="auth-sub">
            We've sent a password reset link to your email address. It may take a few minutes to arrive.
        </p>

        <p class="auth-sub" style="margin-top: 1.25rem; text-align: center;">
            <a href="/login/" class="auth-link">← Back to sign in</a>
        </p>

    </div>
</div>
{% endblock %}
